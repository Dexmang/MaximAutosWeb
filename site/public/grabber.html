<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .badge {
    background: #0a2540;
    border-radius: 40px;
    padding: 10px 18px 10px 14px;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .top {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .icon {
    width: 22px;
    height: 22px;
    background: #f08010;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon svg { width: 12px; height: 12px; }
  .name {
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: #ffffff;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .live {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-left: 29px;
  }
  .dot {
    width: 6px;
    height: 6px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .live-text {
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #22c55e;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="badge">
    <div class="top">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
      </div>
      <span class="name">Chat with Jerry</span>
    </div>
    <div class="live">
      <div class="dot"></div>
      <span class="live-text">Live</span>
    </div>
  </div>
</body>
</html>
