name: Update Google Reviews

# DISABLED 2026-05-25: scraper went blind (Google blocks the request, parses null,
# exits 0 silently). MaxGoogle daily-gbp-check skill now owns reviews_meta.json —
# it reads the count directly from the GBP UI via Chrome MCP and commits if changed.
# Kept for manual trigger only in case the scraper is ever fixed.
on:
  workflow_dispatch:        # Manual trigger only

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update review count
        run: node scripts/update-reviews.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add site/src/data/reviews_meta.json
          git diff --staged --quiet || git commit -m "chore: update Google review count [skip ci]"
          git push
