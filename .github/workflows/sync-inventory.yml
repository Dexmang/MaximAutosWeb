name: Sync Inventory from CarGurus

on:
  schedule:
    # Every 6 hours: 12am, 6am, 12pm, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run inventory sync
        run: node scripts/sync-from-cargurus.js

      - name: Rebuild GMC feed
        run: node scripts/build-gmc-feed.js --strict

      - name: Check for changes
        id: diff
        run: |
          # -I'<lastBuildDate>' ignores the feed's timestamp-only churn so we
          # don't create a commit every 6h when nothing real changed.
          if git diff --quiet -I'<lastBuildDate>' site/src/data/vehicles.json site/src/data/url-events.jsonl web_assets/feeds/vehicles.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated inventory
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/data/vehicles.json site/src/data/url-events.jsonl web_assets/feeds/vehicles.xml
          git commit -m "chore: sync inventory from CarGurus [${{ github.run_number }}]"
          git push

      - name: Alert on sync failure
        if: failure()
        run: |
          curl -s -X POST "https://ntfy.sh/maxim-autos-sync-alerts" \
            -H "Title: maximautos.com sync FAILED" \
            -H "Priority: high" \
            -H "Tags: rotating_light" \
            -d "CarGurus inventory sync failed on run #${{ github.run_number }}. Inventory may be out of sync. Check: https://github.com/Dexmang/MaximAutosWeb/actions"
