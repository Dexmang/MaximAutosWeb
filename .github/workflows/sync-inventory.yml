name: Sync Inventory from CarGurus

on:
  schedule:
    # Every 6 hours: 12am, 6am, 12pm, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # CarGurus dealer + VIN stats (7-day rolling; token is embedded in the
      # scripts, so they run in CI). Self-healing: an API failure writes a
      # placeholder and exits 0, so the sync still proceeds. Moved here from the
      # retired local maxim-cargurus-sync routine so this Action is the single
      # CarGurus enrichment job.
      - name: Refresh CarGurus stats
        run: |
          node scripts/sync-cargurus-dealer-stats.js || true
          node scripts/sync-cargurus-vin-stats.js || true

      - name: Run inventory sync
        run: node scripts/sync-from-cargurus.js

      - name: Rebuild GMC feed
        run: node scripts/build-gmc-feed.js --strict

      - name: Check for changes
        id: diff
        run: |
          # -I'<lastBuildDate>' ignores the feed's timestamp-only churn so we
          # don't create a commit every 6h when nothing real changed.
          if git diff --quiet -I'<lastBuildDate>' \
              site/src/data/vehicles.json site/src/data/url-events.jsonl \
              site/src/data/cargurus-dealer-stats.json site/src/data/cargurus-vin-stats.json \
              web_assets/feeds/vehicles.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated inventory
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Note: inventory-meta.json (the IUlive/IUverify footer heartbeat) is owned
          # by the DealerCenter pull, not this Action — don't touch it here.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/data/vehicles.json site/src/data/url-events.jsonl \
            site/src/data/cargurus-dealer-stats.json site/src/data/cargurus-vin-stats.json \
            web_assets/feeds/vehicles.xml
          git commit -m "chore: sync CarGurus inventory + stats [${{ github.run_number }}]"
          git push
